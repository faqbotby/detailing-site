<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <!-- 1. Этот тег сделает страницу ровной на телефонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 2. Эти три тега запретят кэшировать страницу, чтобы сайт больше не "клинило" -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Dziękujemy!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white d-flex align-items-center justify-content-center vh-100 text-center">
    <!-- Добавили контейнер, чтобы на узких экранах текст не прилиpal к краям телефона -->
    <div class="container px-4">
        <h1 class="text-danger fw-black mb-3 fs-2">DZIĘKUJEMY ZA ZGŁOSZENIE! 🔥</h1>
        <p class="fs-5 text-white-50 mb-4">Skontaktujemy się z Tobą w najbliższym czasie, aby potwierdzić szczegóły wizyty.</p>
        <a href="/" class="btn btn-outline-danger rounded-pill px-4 py-2">Powrót do strony głównej</a>
    </div>
</body>
</html>
